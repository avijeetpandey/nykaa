# Spring
spring.application.name=nykaa
server.port=3000

# JPA / PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/nykaa
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Elasticsearch
spring.elasticsearch.uris=http://127.0.0.1:9200
spring.data.elasticsearch.client.reactive.use-ssl=false

# JWT
app.jwt.secret=bnlrYWEtand0LXNlY3JldC1rZXktMjAyNi12ZXJ5LXNlY3VyZQ==
app.jwt.expiration-ms=3600000

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.admin.fail-fast=false
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=nykaa-saga-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.properties.spring.json.trusted.packages=com.avijeet.nykaa.*,java.util.*

# Debezium CDC — connector registration coordinates
app.debezium.connector-url=http://localhost:8083
app.debezium.postgres.host=postgres
app.debezium.postgres.port=5432
app.debezium.postgres.database=nykaa

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.prometheus.access=unrestricted
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.env=local

# Distributed Tracing (Micrometer Brave + Zipkin)
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
