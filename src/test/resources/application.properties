spring.application.name=nykaa-test
spring.datasource.url=jdbc:h2:mem:nykaa;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

app.jwt.secret=dGVzdC1ueWthYS1qd3Qtc2VjcmV0LWtleS0yMDI2LXN1cGVyLXNlY3VyZQ==
app.jwt.expiration-ms=3600000

# Elasticsearch (overridden by @DynamicPropertySource in integration tests)
spring.elasticsearch.uris=http://127.0.0.1:9200

# Redis (overridden by @DynamicPropertySource in integration tests)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Kafka (overridden by @DynamicPropertySource in integration tests)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.admin.fail-fast=false

# Disable distributed tracing in all tests
management.tracing.sampling.probability=0.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
